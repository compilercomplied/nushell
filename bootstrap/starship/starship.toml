# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
format = '$username$hostname$localip$shlvl$singularity$kubernetes$nats${custom.repo}$directory$vcsh$fossil_branch$fossil_metrics$git_branch$git_commit$git_state$git_metrics$git_status$hg_branch$hg_state$pijul_channel$docker_context$package$bun$c$cmake$cobol$cpp$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$fortran$gleam$golang$gradle$haskell$haxe$helm$java$julia$kotlin$lua$maven$mojo$nim$nodejs$ocaml$odin$opa$perl$php$pulumi$purescript$python$quarto$raku$rlang$red$ruby$rust$scala$solidity$swift$terraform$typst$vlang$vagrant$xmake$zig$buf$guix_shell$nix_shell$conda$pixi$meson$spack$memory_usage$aws$gcloud$openstack$azure$direnv$env_var$mise$crystal$sudo$cmd_duration$line_break$jobs$battery$time$status$container$netns$os$shell$character'

[custom.repo]
command = '^git rev-parse --path-format=absolute --git-common-dir | str trim | path dirname | path basename'
when = true
require_repo = true
shell = ['nu', '--no-config-file', '-c']
use_stdin = false
style = 'bold cyan'
format = '[$output]($style)'

[character]
success_symbol = "🐌"
error_symbol = '[✗](bold red)'

[package]
disabled = true

[azure]
disabled = true
style = 'blue'

# [kubernetes]
# disabled = false
# symbol='☸️ '
# [kubernetes.context_aliases]
# 'very-long-dev-k8s-namespace'='dev'

# This will hide 'via Orbstack' in macOS.
[docker_context]
disabled = true

[container]
disabled = true

[directory]
before_repo_root_style = 'bold cyan'
repo_root_style = 'bold cyan'
repo_root_format = '[$path]($style)[$read_only]($read_only_style) '

[mise]
disabled = false
healthy_symbol = ""
unhealthy_symbol = "❌"

[kotlin]
disabled = true

[java]
disabled = true

[gradle]
disabled = true
